services:
  - type: web
    name: finanzas-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finanzas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://finanzas-frontend.onrender.com

databases:
  - name: finanzas-db
    databaseName: finanzas
    plan: free
